<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker 실습</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f4f8;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px 60px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { color: #2d3748; margin-bottom: 8px; }
    p  { color: #718096; }
    .badge {
      display: inline-block;
      margin-top: 16px;
      background: #48bb78;
      color: white;
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🐳 Docker 실습 성공!</h1>
    <p>docker compose up -d --build 명령어로 실행된 컨테이너입니다.</p>
    <span class="badge">nginx:alpine 위에서 동작 중</span>
  </div>
</body>
</html>
